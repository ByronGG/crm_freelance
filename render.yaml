# Render Blueprint — backend NestJS + Postgres administrada (Trato · CRM).
#
# Cómo usarlo:
#   1. En Render: New → Blueprint → conecta este repositorio.
#   2. Render lee este archivo y crea la BD + el web service.
#   3. Tras el primer deploy, pega la URL del frontend (Vercel) en CORS_ORIGIN.
#
# Nota sobre los cron jobs: en el plan `free` el servicio se duerme tras ~15 min
# de inactividad, así que los @Cron diarios NO se disparan mientras duerme (solo
# el catch-up de onModuleInit al despertar). Para que los jobs corran de verdad,
# usa `plan: starter` (proceso siempre vivo). Docs: https://render.com/docs/blueprint-spec

databases:
  - name: trato-db
    databaseName: trato
    user: trato
    plan: free            # free: se elimina a los ~30 días. Para permanencia usa Neon o sube de plan.

services:
  - type: web
    name: trato-api
    runtime: node
    plan: free            # sube a `starter` si necesitas que los cron jobs corran a diario
    rootDir: backend
    autoDeploy: true
    healthCheckPath: /api/health
    # --include=dev fuerza las devDependencies (nest CLI, prisma, tsx) aunque NODE_ENV=production.
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    # Las migraciones NO corren en el arranque, a propósito: un `migrate deploy`
    # que falle (p. ej. la guarda de una migración) encadenado con `&&` dejaría
    # el servicio sin bootear. En el plan `free` no existe `preDeployCommand`, así
    # que las migraciones de esquema se aplican A MANO contra la BD de prod ANTES
    # de desplegar, desde backend/:
    #   DATABASE_URL="<connectionString externa de trato-db>" npx prisma migrate deploy
    # Si subes a `starter` (o superior), mueve las migraciones a un
    # `preDeployCommand: npx prisma migrate deploy` (corre en una instancia
    # aparte; si falla, el deploy falla pero la versión anterior sigue viva).
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trato-db
          property: connectionString
      - key: NODE_ENV
        value: production
      # Render inyecta PORT automáticamente y main.ts lo lee (config.get('PORT')).
      - key: CORS_ORIGIN
        sync: false        # ← pega aquí la URL del frontend en Vercel (p. ej. https://trato.vercel.app)
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
