# Entorno local: Postgres + backend (NestJS) + frontend (Vite).
# Requiere Docker. Para solo la base de datos: `docker compose up db`.

services:
  db:
    image: postgres:16-alpine
    container_name: crm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm_freelance
    # 5433 en el host para no chocar con un Postgres local en 5432.
    # Dentro de la red de Docker el contenedor sigue siendo 5432.
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm_freelance"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://crm:crm@db:5432/crm_freelance?schema=public"
      PORT: "3000"
      NODE_ENV: development
      CORS_ORIGIN: "http://localhost:5173"
      JWT_ACCESS_SECRET: "dev-access-secret-change-me"
      JWT_ACCESS_EXPIRES_IN: "15m"
      JWT_REFRESH_SECRET: "dev-refresh-secret-change-me"
      JWT_REFRESH_EXPIRES_IN: "7d"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: "http://localhost:3000/api"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data:
