name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancela ejecuciones anteriores de la misma rama/PR si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Generar cliente Prisma
        run: npx prisma generate
        env:
          # generate no conecta a la BD; una URL cualquiera basta.
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

      - name: Lint
        run: npx eslint "src/**/*.ts" "test/**/*.ts"

      - name: Tests (Prisma mockeado, sin BD)
        run: npm test

      - name: Build
        run: npm run build

  frontend:
    name: Frontend (lint · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
